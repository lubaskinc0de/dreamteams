name: lint_test_deploy
on:
    push:
        branches:
            - "**"
        tags:
            - "v*"
    pull_request:
jobs:
    lint:
        name: "Run linters"
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  persist-credentials: false

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.13.7"

            - name: Install uv
              uses: astral-sh/setup-uv@v7
              with:
                  version: "0.9.17"
                  enable-cache: true
                  cache-dependency-glob: "uv.lock"

            - name: Install dependencies
              run: |
                  uv pip install ".[ci]" --system

            - name: Ruff
              run: ruff check

            - name: Mypy
              run: mypy

            - name: Import-linter
              run: lint-imports

            - name: Typos
              run: typos

    test:
      name: "Run tests"
      runs-on: ubuntu-latest
      strategy:
        matrix:
          split: [1, 2, 3, 4]
        fail-fast: false

      steps:
        - uses: actions/checkout@v6
          with:
            persist-credentials: false

        - name: Set up uv
          uses: astral-sh/setup-uv@v7
          with:
            version: "0.9.17"
            enable-cache: true
            cache-dependency-glob: "uv.lock"

        - name: Install dependencies
          run: uv sync --extra test --frozen

        - name: Run tests (split)
          run: |
            uv run pytest tests -vvv \
              -n auto \
              --dist=loadfile \
              --splits ${{ strategy.matrix.splitCount || 4 }} \
              --group ${{ matrix.split }} \
              --maxfail=5 \
              -q

    frontend:
        name: "Build frontend"
        if: (github.ref_type == 'tag' && startsWith(github.ref_name, 'v')) || (github.ref_type == 'branch' && startsWith(github.ref_name, 'stage/'))
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  persist-credentials: false

            - name: Set up Node
              uses: actions/setup-node@v6
              with:
                  node-version: "24"
                  cache: npm
                  cache-dependency-path: frontend/package-lock.json

            - name: Install dependencies
              run: npm ci
              working-directory: frontend

            - name: Generate static site
              run: npm run generate
              working-directory: frontend

    release_metadata:
        name: "Prepare release metadata"
        if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
        needs: [lint, test, frontend]
        runs-on: ubuntu-latest
        outputs:
            image_version: ${{ steps.version.outputs.IMAGE_VERSION }}
        permissions:
            contents: read
        steps:
            - name: Checkout the repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: "0"
                  persist-credentials: false

            - name: Verify tag is on master
              run: |
                  TAG_COMMIT="$(git rev-list -n 1 "${GITHUB_REF_NAME}")"
                  if ! git branch --remotes --contains "${TAG_COMMIT}" | grep -q "origin/master"; then
                    echo "Tag ${GITHUB_REF_NAME} does not point to a commit on master"
                    exit 1
                  fi

            - name: Set image version
              id: version
              run: |
                  echo "IMAGE_VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

            - name: Release info
              run: |
                  echo "Image version: ${GITHUB_REF_NAME}"

    stage_metadata:
        name: "Prepare stage metadata"
        if: github.ref_type == 'branch' && startsWith(github.ref_name, 'stage/')
        needs: [lint, test, frontend]
        runs-on: ubuntu-latest
        outputs:
            image_version: ${{ steps.version.outputs.IMAGE_VERSION }}
            image_alias: ${{ steps.version.outputs.IMAGE_ALIAS }}
        steps:
            - name: Set stage image tags
              id: version
              run: |
                  STAGE_NAME="${GITHUB_REF_NAME#stage/}"
                  SAFE_STAGE_NAME="$(printf "%s" "${STAGE_NAME}" | tr '[:upper:]' '[:lower:]' | tr -c 'a-z0-9_.-' '-')"
                  SHORT_SHA="$(printf "%s" "${GITHUB_SHA}" | cut -c1-12)"

                  echo "IMAGE_VERSION=stage-${SHORT_SHA}" >> $GITHUB_OUTPUT
                  echo "IMAGE_ALIAS=stage-${SAFE_STAGE_NAME}" >> $GITHUB_OUTPUT

            - name: Stage info
              run: |
                  echo "Stage image version: ${STEPS_VERSION_OUTPUTS_IMAGE_VERSION}"
                  echo "Stage image alias: ${STEPS_VERSION_OUTPUTS_IMAGE_ALIAS}"
              env:
                  STEPS_VERSION_OUTPUTS_IMAGE_VERSION: ${{ steps.version.outputs.IMAGE_VERSION }}
                  STEPS_VERSION_OUTPUTS_IMAGE_ALIAS: ${{ steps.version.outputs.IMAGE_ALIAS }}

    build_backend:
        name: "Build and push backend"
        if: needs.release_metadata.result == 'success'
        needs: [release_metadata]
        runs-on: ubuntu-latest
        permissions:
            packages: write
            contents: read
        steps:
            - name: Checkout the repository
              uses: actions/checkout@v4
              with:
                  persist-credentials: false

            - name: Docker Setup Buildx
              uses: docker/setup-buildx-action@v3

            - name: Docker Login
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push backend
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: ./docker/Dockerfile
                  push: true
                  tags: |
                      ghcr.io/${{ github.repository }}:${{ needs.release_metadata.outputs.image_version }}
                      ghcr.io/${{ github.repository }}:latest

    build_stage_backend:
        name: "Build and push stage backend"
        if: needs.stage_metadata.result == 'success'
        needs: [stage_metadata]
        runs-on: ubuntu-latest
        permissions:
            packages: write
            contents: read
        steps:
            - name: Checkout the repository
              uses: actions/checkout@v4
              with:
                  persist-credentials: false

            - name: Docker Setup Buildx
              uses: docker/setup-buildx-action@v3

            - name: Docker Login
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push stage backend
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: ./docker/Dockerfile
                  push: true
                  tags: |
                      ghcr.io/${{ github.repository }}:${{ needs.stage_metadata.outputs.image_version }}
                      ghcr.io/${{ github.repository }}:${{ needs.stage_metadata.outputs.image_alias }}

    build_frontend:
        name: "Build and push frontend"
        if: needs.release_metadata.result == 'success'
        needs: [release_metadata]
        runs-on: ubuntu-latest
        permissions:
            packages: write
            contents: read
        steps:
            - name: Checkout the repository
              uses: actions/checkout@v4
              with:
                  persist-credentials: false

            - name: Docker Setup Buildx
              uses: docker/setup-buildx-action@v3

            - name: Docker Login
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push frontend
              uses: docker/build-push-action@v6
              with:
                  context: ./frontend
                  file: ./frontend/Dockerfile
                  push: true
                  tags: |
                      ghcr.io/${{ github.repository }}-frontend:${{ needs.release_metadata.outputs.image_version }}
                      ghcr.io/${{ github.repository }}-frontend:latest

    build_stage_frontend:
        name: "Build and push stage frontend"
        if: needs.stage_metadata.result == 'success'
        needs: [stage_metadata]
        runs-on: ubuntu-latest
        permissions:
            packages: write
            contents: read
        steps:
            - name: Checkout the repository
              uses: actions/checkout@v4
              with:
                  persist-credentials: false

            - name: Docker Setup Buildx
              uses: docker/setup-buildx-action@v3

            - name: Docker Login
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push stage frontend
              uses: docker/build-push-action@v6
              with:
                  context: ./frontend
                  file: ./frontend/Dockerfile
                  push: true
                  tags: |
                      ghcr.io/${{ github.repository }}-frontend:${{ needs.stage_metadata.outputs.image_version }}
                      ghcr.io/${{ github.repository }}-frontend:${{ needs.stage_metadata.outputs.image_alias }}
