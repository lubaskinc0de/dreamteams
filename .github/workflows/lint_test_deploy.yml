name: lint_test_deploy
on:
    push:
        branches:
            - "**"
        tags:
            - "v*"
    pull_request:
jobs:
    lint:
        name: "Run linters"
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  persist-credentials: false

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.13.7"

            - name: Install uv
              uses: astral-sh/setup-uv@v7
              with:
                  version: "0.9.17"
                  enable-cache: true
                  cache-dependency-glob: "uv.lock"

            - name: Install dependencies
              run: |
                  uv pip install ".[ci]" --system

            - name: Ruff
              run: ruff check

            - name: Mypy
              run: mypy

            - name: Import-linter
              run: lint-imports

            - name: Typos
              run: typos

            - name: Gitleaks
              uses: gitleaks/gitleaks-action@v2
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  GITLEAKS_BASELINE_PATH: .gitleaks-baseline.json

    test:
      name: "Run tests"
      runs-on: ubuntu-latest
      strategy:
        matrix:
          split: [1, 2, 3, 4]
        fail-fast: false

      steps:
        - uses: actions/checkout@v6
          with:
            persist-credentials: false

        - name: Set up uv
          uses: astral-sh/setup-uv@v7
          with:
            version: "0.9.17"
            enable-cache: true
            cache-dependency-glob: "uv.lock"

        - name: Install dependencies
          run: uv sync --extra test --frozen

        - name: Run tests (split)
          run: |
            uv run pytest tests -vvv \
              -n auto \
              --dist=loadfile \
              --splits ${{ strategy.matrix.splitCount || 4 }} \
              --group ${{ matrix.split }} \
              --maxfail=5 \
              -q

    build_metadata:
        name: "Prepare build metadata"
        if: (github.ref_type == 'tag' && startsWith(github.ref_name, 'v')) || (github.ref_type == 'branch' && startsWith(github.ref_name, 'stage/'))
        needs: [lint, test]
        runs-on: ubuntu-latest
        outputs:
            backend_tags: ${{ steps.tags.outputs.BACKEND_TAGS }}
            frontend_tags: ${{ steps.tags.outputs.FRONTEND_TAGS }}
        permissions:
            contents: read
        steps:
            - name: Checkout the repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: "0"
                  persist-credentials: false

            - name: Verify tag is on master
              if: github.ref_type == 'tag'
              run: |
                  TAG_COMMIT="$(git rev-list -n 1 "${GITHUB_REF_NAME}")"
                  if ! git branch --remotes --contains "${TAG_COMMIT}" | grep -q "origin/master"; then
                    echo "Tag ${GITHUB_REF_NAME} does not point to a commit on master"
                    exit 1
                  fi

            - name: Set image tags
              id: tags
              run: |
                  if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
                    BACKEND_TAGS="ghcr.io/${GITHUB_REPOSITORY}:${GITHUB_REF_NAME}"$'\n'"ghcr.io/${GITHUB_REPOSITORY}:latest"
                    FRONTEND_TAGS="ghcr.io/${GITHUB_REPOSITORY}-frontend:${GITHUB_REF_NAME}"$'\n'"ghcr.io/${GITHUB_REPOSITORY}-frontend:latest"
                  else
                    STAGE_NAME="${GITHUB_REF_NAME#stage/}"
                    SAFE_STAGE_NAME="$(printf "%s" "${STAGE_NAME}" | tr '[:upper:]' '[:lower:]' | tr -c 'a-z0-9_.-' '-')"
                    SHORT_SHA="$(printf "%s" "${GITHUB_SHA}" | cut -c1-12)"

                    BACKEND_TAGS="ghcr.io/${GITHUB_REPOSITORY}:stage-${SHORT_SHA}"$'\n'"ghcr.io/${GITHUB_REPOSITORY}:stage-${SAFE_STAGE_NAME}"
                    FRONTEND_TAGS="ghcr.io/${GITHUB_REPOSITORY}-frontend:stage-${SHORT_SHA}"$'\n'"ghcr.io/${GITHUB_REPOSITORY}-frontend:stage-${SAFE_STAGE_NAME}"
                  fi

                  {
                    echo "BACKEND_TAGS<<EOF"
                    echo "${BACKEND_TAGS}"
                    echo "EOF"
                    echo "FRONTEND_TAGS<<EOF"
                    echo "${FRONTEND_TAGS}"
                    echo "EOF"
                  } >> $GITHUB_OUTPUT

            - name: Build info
              run: |
                  echo "Backend tags:"
                  echo "${STEPS_TAGS_OUTPUTS_BACKEND_TAGS}"
                  echo "Frontend tags:"
                  echo "${STEPS_TAGS_OUTPUTS_FRONTEND_TAGS}"
              env:
                  STEPS_TAGS_OUTPUTS_BACKEND_TAGS: ${{ steps.tags.outputs.BACKEND_TAGS }}
                  STEPS_TAGS_OUTPUTS_FRONTEND_TAGS: ${{ steps.tags.outputs.FRONTEND_TAGS }}


    build_backend:
        name: "Build and push backend"
        if: needs.build_metadata.result == 'success'
        needs: [build_metadata]
        runs-on: ubuntu-latest
        permissions:
            packages: write
            contents: read
        steps:
            - name: Checkout the repository
              uses: actions/checkout@v4
              with:
                  persist-credentials: false

            - name: Docker Setup Buildx
              uses: docker/setup-buildx-action@v3

            - name: Docker Login
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push backend
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: ./docker/Dockerfile
                  push: true
                  tags: ${{ needs.build_metadata.outputs.backend_tags }}

    build_frontend:
        name: "Build and push frontend"
        if: needs.build_metadata.result == 'success'
        needs: [build_metadata]
        runs-on: ubuntu-latest
        permissions:
            packages: write
            contents: read
        steps:
            - name: Checkout the repository
              uses: actions/checkout@v4
              with:
                  persist-credentials: false

            - name: Docker Setup Buildx
              uses: docker/setup-buildx-action@v3

            - name: Docker Login
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push frontend
              uses: docker/build-push-action@v6
              with:
                  context: ./frontend
                  file: ./frontend/Dockerfile
                  push: true
                  tags: ${{ needs.build_metadata.outputs.frontend_tags }}
