# PostgreSQL config for DreamTeams.
# Sparse override file — PG falls back to built-in defaults for everything not listed here.
# Sized for a 16GB host where PG shares the box with grafana/loki/redis/api/etc —
# PG gets ~6GB working budget (shared_buffers + work_mem peak), planner sees ~10GB OS cache.

#-----------------------------------------------------------------------------
# Connections
#-----------------------------------------------------------------------------
listen_addresses = '*'
max_connections = 300

#-----------------------------------------------------------------------------
# Memory
#-----------------------------------------------------------------------------
# Rule of thumb: shared_buffers ≈ 25% RAM, effective_cache_size ≈ 50–75% RAM.
shared_buffers = 4GB
effective_cache_size = 10GB
work_mem = 16MB
maintenance_work_mem = 1GB

#-----------------------------------------------------------------------------
# WAL & checkpoints
#-----------------------------------------------------------------------------
wal_buffers = 64MB
min_wal_size = 2GB
max_wal_size = 8GB
checkpoint_completion_target = 0.9
checkpoint_timeout = 15min
synchronous_commit = on

#-----------------------------------------------------------------------------
# Planner — assume SSD storage
#-----------------------------------------------------------------------------
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 100

#-----------------------------------------------------------------------------
# Parallelism
#-----------------------------------------------------------------------------
max_worker_processes = 8
max_parallel_workers = 8
max_parallel_workers_per_gather = 2
max_parallel_maintenance_workers = 2

#-----------------------------------------------------------------------------
# JIT — usually counterproductive for short OLTP queries
#-----------------------------------------------------------------------------
jit = off

#-----------------------------------------------------------------------------
# Safety timeouts
#-----------------------------------------------------------------------------
statement_timeout = 30s
idle_in_transaction_session_timeout = 60s
lock_timeout = 5s

#-----------------------------------------------------------------------------
# Observability
#-----------------------------------------------------------------------------
track_io_timing = on
track_functions = pl
log_min_duration_statement = 200ms
log_lock_waits = on
log_temp_files = 0
log_checkpoints = on
log_autovacuum_min_duration = 1s
log_line_prefix = '%m [%p] %q%u@%d '

#-----------------------------------------------------------------------------
# Autovacuum — defaults are fine for low write volume; bump if write rate grows
#-----------------------------------------------------------------------------
autovacuum = on
autovacuum_naptime = 30s

#-----------------------------------------------------------------------------
# Misc
#-----------------------------------------------------------------------------
timezone = 'UTC'
