events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;

    upstream oauth2_proxy {
        server oauth2-proxy:8000;
    }

    upstream api {
        server api:5000;
    }

    upstream exporter_api {
        server exporter-api:8001;
    }

    upstream s3 {
        server rustfs:9000;
    }

    server {
        listen 80;
        root /usr/share/nginx/html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Full logout chain: oauth2-proxy sign_out -> Authentik end-session -> /.
        # http://localhost/ must be registered as post-logout redirect URI in
        # the Authentik provider (see docs/authentik-setup.md).
        location = /logout {
            return 302 "/oauth2/sign_out?rd=http%3A%2F%2F127.0.0.1.sslip.io%3A8080%2Fapplication%2Fo%2Fdreamteams%2Fend-session%2F%3Fpost_logout_redirect_uri%3Dhttp%253A%252F%252Flocalhost%252F%26id_token_hint%3D%7Bid_token%7D";
        }

        location /oauth2/ {
            proxy_pass       http://oauth2_proxy;
            proxy_set_header Host                    $host;
            proxy_set_header X-Real-IP               $remote_addr;
            proxy_set_header X-Auth-Request-Redirect $request_uri;
            # or, if you are handling multiple domains:
            # proxy_set_header X-Auth-Request-Redirect $scheme://$host$request_uri;
        }
        
        location = /oauth2/auth {
            proxy_pass       http://oauth2_proxy;
            proxy_set_header Host             $host;
            proxy_set_header X-Real-IP        $remote_addr;
            proxy_set_header X-Forwarded-Uri  $request_uri;
            # nginx auth_request includes headers but not body
            proxy_set_header Content-Length   "";
            proxy_pass_request_body           off;
        }

        location /s3/ {
            proxy_pass http://s3/;
        }

        location ~ ^/api/exports(?:/|$) {
            include /etc/nginx/snippets/oauth2-auth-request.conf;
            rewrite ^/api/exports/?(.*)$ /exports/$1 break;
            proxy_pass http://exporter_api;
        }

        location /api {
            include /etc/nginx/snippets/oauth2-auth-request.conf;
            proxy_pass http://api;
        }
    }
}
