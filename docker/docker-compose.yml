services:
    nginx:
        image: nginx:1.29.3
        restart: unless-stopped
        container_name: nginx
        ports:
            - "80:80"
        volumes:
            - ../.config/nginx.conf:/etc/nginx/nginx.conf
            - ../frontend/.output/public:/usr/share/nginx/html:ro
        depends_on:
            api:
                condition: service_healthy
            oauth2-proxy:
                condition: service_healthy
            rustfs:
                condition: service_started
        networks:
            - "shared"

    oauth2-proxy:
        image: quay.io/oauth2-proxy/oauth2-proxy:v7.11.0-alpine
        container_name: oauth2-proxy
        command: ["--config=/etc/oauth2-proxy/oauth2-proxy.toml"]
        env_file:
            - ../.config/.env.oauthproxy
        ports:
            - 4180:8000
        volumes:
            - ../.config/oauth2-proxy.toml:/etc/oauth2-proxy/oauth2-proxy.toml
        extra_hosts:
            - "127.0.0.1.sslip.io:host-gateway"
        healthcheck:
            test:
                [
                    "CMD",
                    "wget",
                    "--no-verbose",
                    "--tries=1",
                    "--spider",
                    "http://localhost:8000/ready",
                ]
            interval: 5s
            timeout: 10s
            retries: 3
            start_period: 2s
        depends_on:
            redis:
                condition: service_healthy
            authentik-server:
                condition: service_healthy
        networks:
            - "shared"

    redis:
        image: redis:7.0
        container_name: redis
        expose:
            - 6379
        command:
            ["redis-server", "--appendonly", "yes", "--save", "60", "10000"]
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 2s
        volumes:
            - redis_data:/data
        networks:
            - "shared"

    migrations:
        command: ["dreamteams", "migrations", "apply"]
        container_name: migrations
        restart: no
        build:
            context: ../
            dockerfile: docker/Dockerfile
        env_file:
            - "../.config/.env.migrations"
        depends_on:
            db:
                condition: service_healthy
        networks:
            - "shared"

    api:
        container_name: api
        restart: unless-stopped
        command: ["dreamteams", "run", "api"]
        build:
            context: ../
            dockerfile: docker/Dockerfile
            args:
                # set PROFILE_BUILD=1 in env (or `--build-arg PROFILE_BUILD=1`) to bake py-spy into the image
                PROFILE_BUILD: ${PROFILE_BUILD:-0}
        env_file:
            - "../.config/.env"
        volumes:
            - "../.config/config.toml:/etc/dreamteams/config.toml"
        # required for py-spy to attach to the running python process
        cap_add:
            - SYS_PTRACE
        healthcheck:
            test:
                [
                    "CMD",
                    "curl",
                    "-f",
                    "http://localhost:${APP_SERVER_PORT}/internal/ready",
                ]
            interval: 4s
        depends_on:
            pgbouncer:
                condition: service_started
            migrations:
                condition: service_completed_successfully
            rustfs:
                condition: service_started
        networks:
            - "shared"

    db:
        container_name: db
        restart: unless-stopped
        image: postgres:18
        command:
            - "postgres"
            - "-c"
            - "config_file=/etc/postgresql/postgresql.conf"
        env_file:
            - ../.config/.env.pg
        ports:
            - 5432:5432
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres"]
            interval: 2s
        volumes:
            - ../.config/init-db.sql:/docker-entrypoint-initdb.d/init.sql
            - ../.config/postgresql.conf:/etc/postgresql/postgresql.conf:ro
            - pg_data:/var/lib/postgresql
        networks:
            - "shared"

    pgbouncer:
        container_name: pgbouncer
        restart: unless-stopped
        image: edoburu/pgbouncer:v1.23.1-p3
        env_file:
            - ../.config/.env.pgbouncer
        expose:
            - 6432
        ports:
            - 6432:6432
        depends_on:
            db:
                condition: service_healthy
        networks:
            - "shared"

    rustfs:
        image: rustfs/rustfs:1.0.0-alpha.82
        container_name: rustfs
        ports:
            - 9000:9000
            - 9001:9001
        environment:
            - RUSTFS_ACCESS_KEY=${APP_S3_ACCESS_KEY}
            - RUSTFS_SECRET_KEY=${APP_S3_SECRET_KEY}
        volumes:
            - rustfs_data:/data
        networks:
            - "shared"

    authentik-server:
        image: ghcr.io/goauthentik/server:2026.2.2
        container_name: authentik-server
        restart: unless-stopped
        command: ["server"]
        env_file:
            - ../.config/.env.authentik
        ports:
            - "8080:9000"
        healthcheck:
            test:
                [
                    "CMD",
                    "python",
                    "-c",
                    "import urllib.request; urllib.request.urlopen('http://localhost:9000/-/health/ready/', timeout=2)"
                ]
            interval: 10s
            timeout: 10s
            retries: 12
            start_period: 30s
        depends_on:
            db:
                condition: service_healthy
        volumes:
            - authentik_data:/data
            - authentik_templates:/templates
        networks:
            - "shared"

    authentik-worker:
        image: ghcr.io/goauthentik/server:2026.2.2
        container_name: authentik-worker
        restart: unless-stopped
        command: ["worker"]
        env_file:
            - ../.config/.env.authentik
        depends_on:
            db:
                condition: service_healthy
        healthcheck:
            test: ["CMD", "ak", "healthcheck"]
            interval: 10s
            timeout: 10s
            retries: 12
            start_period: 20s
        volumes:
            - authentik_data:/data
            - authentik_templates:/templates
        networks:
            - "shared"

volumes:
    pg_data:
    grafana_data:
    loki_data:
    redis_data:
    rustfs_data:
    authentik_data:
    authentik_templates:

networks:
    shared:
        external: true
