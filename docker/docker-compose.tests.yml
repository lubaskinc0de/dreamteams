services:
    tests:
        restart: no
        build:
            context: ../
            dockerfile: docker/tests.Dockerfile
        env_file:
            - "../.config/.env.tests"
        volumes:
            - "../.config/config.toml:/etc/dreamteams/config.toml"
        container_name: tests
        environment:
            - API_URL=http://api:${APP_SERVER_PORT}
        depends_on:
            - api

    migrations:
        extends:
            file: docker-compose.base.yml
            service: migrations
        depends_on:
            db:
                condition: service_healthy

    api:
        extends:
            file: docker-compose.base.yml
            service: api
        depends_on:
            db:
                condition: service_healthy
            migrations:
                condition: service_completed_successfully
            rustfs:
                condition: service_started
        environment:
            - APP_S3_PUBLIC_URL=http://rustfs:9000

    db:
        extends:
            file: docker-compose.base.yml
            service: db
    
    rustfs:
        extends:
            file: docker-compose.base.yml
            service: rustfs